services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: always
    ports:
      - "80:80"   # HTTP for ACME challenges
      - "443:443" # HTTPS
      - "8080:8080" # Traefik dashboard (optional)
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=annangi.sriteja@gmail.com" # Replace with your email
      - "--certificatesresolvers.myresolver.acme.storage=/acme.json" # Traefik will store certs here
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/acme.json:/acme.json
    networks:
      - web

networks:
  web:
    driver: bridge

#picoshare

services:
  picoshare:
    image: mtlynch/picoshare
    environment:
      - PORT=4002
      - PS_SHARED_SECRET=Demigod  # Change this to a more secure password
    ports:
      - "4002:4002"
    volumes:
      - ./data:/data
    command:
      -db /data/store.db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.picoshare.rule=Host(`teja.karthi-on-a.quest`)"  # Replace with your actual domain
      - "traefik.http.routers.picoshare.entrypoints=websecure"
      - "traefik.http.routers.picoshare.tls=true"
      - "traefik.http.routers.picoshare.tls.certresolver=myresolver"
      - "traefik.http.services.picoshare.loadbalancer.server.port=4002"
    networks:
      - web
